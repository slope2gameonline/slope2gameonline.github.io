# Global Redirects for Game Slugs
# These rules ensure that:
# 1. Requests with a trailing slash (e.g., /game/) are 301-redirected to the non-slash version (/game).
# 2. Requests to /game are internally served by /game/index.html (200 OK) so the URL stays clean in the browser.

[[redirects]]
  from = "/bloodmoney/"
  to = "/bloodmoney"
  status = 301
  force = true
[[redirects]]
  from = "/bloodmoney"
  to = "/bloodmoney/index.html"
  status = 200
  force = true

